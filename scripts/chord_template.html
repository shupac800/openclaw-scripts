<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  #diagram { position: relative; }
  /* VexFlow renders into this off-screen div */
  #vexStaff { position: absolute; left: -9999px; top: -9999px; }
  #output { display: block; }
</style>
<script src="https://unpkg.com/vexflow@4.2.5/build/cjs/vexflow.js"></script>
</head>
<body>
<div id="diagram">
  <div id="vexStaff"></div>
  <canvas id="output"></canvas>
</div>
<script>
// ---- constants ----
const STRING_ORDER = ['e', 'B', 'G', 'D', 'A', 'E'];
const OPEN_SEMITONES = { E: 4, A: 9, D: 2, G: 7, B: 11, e: 4 };
const OPEN_MIDI = { E: 40, A: 45, D: 50, G: 55, B: 59, e: 64 };
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_MAP = { Eb:'D#', Bb:'A#', Ab:'G#', Db:'C#', Gb:'F#', Fb:'E', Cb:'B' };
const INTERVAL_NAME_MAP = {
  R:'R', '1':'R', b3:'m3', m3:'m3', '3':'3',
  b5:'dim5', '5-':'dim5', dim5:'dim5', '5':'5',
  '#5':'aug5', '5+':'aug5', aug5:'aug5',
};
const STRING_TO_ORDINAL = { e:'1st', B:'2nd', G:'3rd', D:'4th', A:'5th', E:'6th' };

const COLOR_BG = '#000000';
const COLOR_FG = '#ffffff';
const COLOR_LINE = '#9b9b9b';
const COLOR_ROOT = '#ffff00';
const COLOR_THIRD = '#ff3232';
const COLOR_FIFTH = '#00a0ff';
const INTERVAL_COLORS = {
  R: COLOR_ROOT, '3': COLOR_THIRD, m3: COLOR_THIRD,
  '5': COLOR_FIFTH, dim5: COLOR_FIFTH, aug5: COLOR_FIFTH,
};

const IMG_H = 182;
const CUE_H = 125; // extra height for recall cues below the diagram
const TAB_STRING_SPACING = 17;
const TAB_LINE_LEFT = 30;
const TAB_LINE_WIDTH = 120;
const MARGIN = 16;
const TAB_Y = 68;
const TAB_LABEL_W = 70;
const GAP = 24;

// ---- enharmonic helpers ----
const SHARP_TO_FLAT = { 'C#':'Db', 'D#':'Eb', 'F#':'Gb', 'G#':'Ab', 'A#':'Bb' };

const FLAT_TO_SHARP = { Db:'C#', Eb:'D#', Gb:'F#', Ab:'G#', Bb:'A#' };

function respellForKey(noteName, keySigInfo) {
  if (keySigInfo.type === 'flat' && noteName in SHARP_TO_FLAT) {
    return SHARP_TO_FLAT[noteName];
  }
  if (keySigInfo.type === 'sharp' && noteName in FLAT_TO_SHARP) {
    return FLAT_TO_SHARP[noteName];
  }
  return noteName;
}

// ---- helpers ----
function ordinal(n) {
  if (11 <= n % 100 && n % 100 <= 13) return n + 'th';
  const s = ['th','st','nd','rd'];
  return n + (s[n % 10] || 'th');
}
function noteToSemitone(name) {
  const n = FLAT_MAP[name] || name;
  return NOTE_NAMES.indexOf(n);
}
function getInversion(triad) {
  const BASS_ORDER = ['E', 'A', 'D', 'G', 'B', 'e'];
  let bassString = null, bassFret = -1;
  for (const s of BASS_ORDER) {
    if (triad.strings[s] >= 0) { bassString = s; bassFret = triad.strings[s]; break; }
  }
  if (!bassString) return 'root position';
  const bassSemitone = (OPEN_SEMITONES[bassString] + bassFret) % 12;
  for (const [interval, note] of Object.entries(triad.chord_tones)) {
    if (noteToSemitone(note) === bassSemitone) {
      if (interval === 'R') return 'root position';
      if (interval === '3' || interval === 'm3') return '1st inversion';
      return '2nd inversion';
    }
  }
  return 'root position';
}
function formatTitle(triad) {
  const m = triad.name.match(/^(.+?)\s+(Major|Minor|Diminished|Augmented)\s+\(root fret (\d+), (\w) string\)$/);
  if (!m) return { chordName: triad.name, inversion: '', line2: '', chordColor: COLOR_FG };
  const [, root, quality, fret, str] = m;
  const inversion = getInversion(triad);
  const isBright = quality === 'Major' || quality === 'Augmented';
  return {
    chordName: `${root} ${quality.toLowerCase()}`,
    inversion,
    line2: `${STRING_TO_ORDINAL[str]} string, ${ordinal(+fret)} fret`,
    chordColor: isBright ? '#00e5ff' : '#ff69b4'
  };
}
function buildToneMap(triad) {
  const m = {};
  for (const [interval, note] of Object.entries(triad.chord_tones)) {
    const normalized = FLAT_MAP[note] || note;
    const display = INTERVAL_NAME_MAP[interval] || interval;
    m[normalized] = { interval: display, original: note };
  }
  return m;
}
function getWrittenPitch(string, fret) {
  const midi = OPEN_MIDI[string] + fret + 12;
  const octave = Math.floor(midi / 12) - 1;
  const noteIdx = midi % 12;
  return { noteName: NOTE_NAMES[noteIdx], octave };
}
function extractQuality(name) {
  const parts = name.split(' ');
  return parts.length >= 2 ? parts[1] : 'Major';
}

function getKeySigInfo(root, quality) {
  const sigs = window.__keySignatures || [];
  const enharmonic = window.__enharmonicNormalization || {};

  // Normalize via enharmonicNormalization (e.g. "C# major" → "Db major")
  const qualityWord = quality === 'Augmented' ? 'major'
    : quality === 'Diminished' ? 'minor'
    : quality.toLowerCase();
  const lookupKey = `${root} ${qualityWord}`;
  if (enharmonic[lookupKey]) {
    const parts = enharmonic[lookupKey].split(' ');
    root = parts[0];
  }

  let entry;
  if (quality === 'Major' || quality === 'Augmented') {
    entry = sigs.find(e => e.major === root);
  } else {
    // Minor or Diminished: look up by minor key → gives relative major
    entry = sigs.find(e => e.minor === root);
  }
  if (!entry || entry.accidentals === 0) {
    return { vexKey: 'C', accNotes: [], type: 'none' };
  }
  return { vexKey: entry.major, accNotes: entry.signature, type: entry.type };
}

// ---- main render ----
function renderDiagram(triad) {
  const toneMap = buildToneMap(triad);
  const quality = extractQuality(triad.name);
  const keySigInfo = getKeySigInfo(triad.root, quality);
  const chordColor = (quality === 'Major' || quality === 'Augmented') ? '#00e5ff' : '#ff69b4';

  // Respell toneMap originals for the key signature (e.g. Eb → D# in sharp keys)
  for (const key of Object.keys(toneMap)) {
    toneMap[key].original = respellForKey(toneMap[key].original, keySigInfo);
  }

  // Collect played notes
  const notes = [];
  for (const s of STRING_ORDER) {
    const fret = triad.strings[s];
    if (fret === -1) continue;
    const raw = getWrittenPitch(s, fret);
    const noteName = respellForKey(raw.noteName, keySigInfo);
    const octave = raw.octave;
    const semitone = (OPEN_SEMITONES[s] + fret) % 12;
    const sounding = NOTE_NAMES[semitone];
    const entry = toneMap[sounding];
    notes.push({ noteName, octave, entry, string: s, fret });
  }
  notes.sort((a, b) => {
    const aSemi = NOTE_NAMES.indexOf(FLAT_MAP[a.noteName] || a.noteName);
    const bSemi = NOTE_NAMES.indexOf(FLAT_MAP[b.noteName] || b.noteName);
    return (a.octave * 12 + aSemi) - (b.octave * 12 + bSemi);
  });

  // ---- Render VexFlow staff off-screen ----
  const vexDiv = document.getElementById('vexStaff');
  vexDiv.innerHTML = '';
  // Move on-screen temporarily for VexFlow to measure correctly
  vexDiv.style.left = '0px';
  vexDiv.style.top = '0px';

  const vexW = 180;
  const vexFullH = IMG_H;

  const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
  const renderer = new Renderer(vexDiv, Renderer.Backends.SVG);
  renderer.resize(vexW, vexFullH);
  const vexCtx = renderer.getContext();

  // Position stave: VexFlow stave Y is the top of the stave bounding box,
  // the actual top staff line is ~15px below that.
  const staveY = TAB_Y - 15;
  const staveWidth = vexW - 5;
  const stave = new Stave(0, staveY, staveWidth);
  stave.addClef('treble');
  const ks = keySigInfo.vexKey;
  if (ks !== 'C') stave.addKeySignature(ks);
  stave.setContext(vexCtx).draw();

  // Build note
  const vexKeys = notes.map(n => {
    let name = n.noteName;
    let acc = '';
    if (name.includes('#')) { acc = '#'; name = name.replace('#', ''); }
    else if (name.includes('b')) { acc = 'b'; name = name.replace('b', ''); }
    return { key: `${name}/${n.octave}`, acc, entry: n.entry };
  });

  if (vexKeys.length > 0) {
    // Use quarter note for filled noteheads, then hide the stem
    const sn = new StaveNote({
      keys: vexKeys.map(k => k.key),
      duration: 'q',
      auto_stem: true,
    });

    // Accidentals — only add explicit accidentals when the note differs
    // from what the key signature implies for that letter name.
    const keySigLetters = {};
    for (const a of keySigInfo.accNotes) {
      const letter = a.replace(/[#b]/g, '');
      keySigLetters[letter] = a.includes('#') ? '#' : 'b';
    }
    for (let i = 0; i < vexKeys.length; i++) {
      const letter = vexKeys[i].key.split('/')[0];
      const noteAcc = vexKeys[i].acc;         // '', '#', or 'b'
      const keySigDefault = keySigLetters[letter] || '';  // '', '#', or 'b'
      if (noteAcc !== keySigDefault) {
        const displayAcc = noteAcc === '' ? 'n' : noteAcc;
        sn.addModifier(new Accidental(displayAcc), i);
      }
    }

    // Color noteheads
    for (let i = 0; i < vexKeys.length; i++) {
      const entry = vexKeys[i].entry;
      if (entry) {
        const color = INTERVAL_COLORS[entry.interval] || COLOR_FG;
        sn.setKeyStyle(i, { fillStyle: color, strokeStyle: color });
      }
    }

    // Hide stem by making it transparent
    sn.setStemStyle({ fillStyle: 'transparent', strokeStyle: 'transparent' });
    sn.setFlagStyle({ fillStyle: 'transparent', strokeStyle: 'transparent' });

    const voice = new Voice({ num_beats: 4, beat_value: 4 });
    voice.setMode(Voice.Mode.SOFT);
    voice.addTickables([sn]);
    new Formatter().joinVoices([voice]).format([voice], staveWidth - 90);
    voice.draw(vexCtx, stave);

    // Capture actual notehead Y positions from VexFlow
    const noteYs = sn.getYs();  // array of Y coords, one per key (lowest to highest)
    for (let i = 0; i < notes.length; i++) {
      notes[i]._vexY = noteYs[i];
    }
  }

  // Recolor SVG for dark background
  const svg = vexDiv.querySelector('svg');
  const LIGHT = '#9b9b9b';
  const PRESERVE = new Set(Object.values(INTERVAL_COLORS));
  PRESERVE.add('transparent');
  if (svg) {
    svg.style.background = 'transparent';
    svg.querySelectorAll('line, path, rect, text').forEach(node => {
      for (const attr of ['stroke', 'fill']) {
        const v = node.getAttribute(attr);
        if (v && v !== 'none' && !PRESERVE.has(v)) node.setAttribute(attr, LIGHT);
      }
    });
    svg.setAttribute('fill', LIGHT);
    svg.setAttribute('stroke', LIGHT);
    // Color key signature accidentals to match chord name (after general recolor)
    svg.querySelectorAll('.vf-keysignature *').forEach(el => {
      el.setAttribute('fill', chordColor);
    });
  }

  // Move off-screen again
  vexDiv.style.left = '-9999px';
  vexDiv.style.top = '-9999px';

  // ---- Draw final canvas ----
  const tabTotalW = TAB_LINE_LEFT + TAB_LINE_WIDTH + 12 + TAB_LABEL_W;
  const staffX = MARGIN + tabTotalW + GAP;
  const staffLabelW = 55;
  const imgW = staffX + vexW + 8 + staffLabelW + MARGIN;

  const canvas = document.getElementById('output');
  canvas.width = imgW;
  canvas.height = IMG_H + CUE_H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = COLOR_BG;
  ctx.fillRect(0, 0, imgW, IMG_H);

  // Title (two lines)
  ctx.textBaseline = 'alphabetic';
  const title = formatTitle(triad);
  ctx.font = 'bold 17px "Segoe UI", sans-serif';
  ctx.fillStyle = title.chordColor;
  const chordW = ctx.measureText(title.chordName).width;
  ctx.fillText(title.chordName, MARGIN, 20);
  ctx.fillStyle = COLOR_FG;
  ctx.fillText(`  ${title.inversion}`, MARGIN + chordW, 20);
  ctx.font = 'bold 17px "Segoe UI", sans-serif';
  ctx.fillText(title.line2, MARGIN, 40);

  // ---- Tab section ----
  const lineLeft = MARGIN + TAB_LINE_LEFT;
  const lineRight = lineLeft + TAB_LINE_WIDTH;
  const fretCenterX = lineLeft + TAB_LINE_WIDTH / 2;
  const labelX = lineRight + 12;

  ctx.textBaseline = 'middle';
  for (let i = 0; i < STRING_ORDER.length; i++) {
    const s = STRING_ORDER[i];
    const sy = TAB_Y + i * TAB_STRING_SPACING;
    const fret = triad.strings[s];

    // String label
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillStyle = COLOR_FG;
    const lblW = ctx.measureText(s).width;
    ctx.fillText(s, lineLeft - lblW - 8, sy);

    // String line
    ctx.strokeStyle = COLOR_LINE;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lineLeft, sy);
    ctx.lineTo(lineRight, sy);
    ctx.stroke();

    if (fret !== -1) {
      const fStr = String(fret);
      ctx.font = 'bold 15px "Segoe UI", sans-serif';
      const fW = ctx.measureText(fStr).width;
      const fX = fretCenterX - fW / 2;

      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(fX - 3, sy - 9, fW + 6, 18);

      const semitone = (OPEN_SEMITONES[s] + fret) % 12;
      const noteName = NOTE_NAMES[semitone];
      const entry = toneMap[noteName];
      const color = entry ? (INTERVAL_COLORS[entry.interval] || COLOR_FG) : COLOR_FG;

      ctx.fillStyle = color;
      ctx.fillText(fStr, fX, sy);

      if (entry) {
        ctx.font = 'bold 13px "Segoe UI", sans-serif';
        ctx.fillStyle = color;
        ctx.fillText(`${entry.interval}  ${entry.original}`, labelX, sy);
      }
    }
  }

  // ---- Composite VexFlow SVG onto canvas ----
  if (svg) {
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, staffX, 0);
      URL.revokeObjectURL(url);
      drawStaffLegend(ctx, notes, staffX + vexW + 8);
      drawCues(ctx, triad, imgW, IMG_H);
      window.__diagramReady = true;
    };
    img.src = url;
  } else {
    drawCues(ctx, triad, imgW, IMG_H);
    window.__diagramReady = true;
  }
}

function drawStaffLegend(ctx, notes, labelX) {
  ctx.font = 'bold 13px "Segoe UI", sans-serif';
  const sampleH = 14;
  const minDist = sampleH + 3;

  // Use actual VexFlow notehead Y positions (from sn.getYs())
  const labelYs = notes.map(n => n._vexY != null ? n._vexY : TAB_Y);

  // Enforce min spacing (notes sorted ascending pitch → descending Y)
  for (let j = labelYs.length - 2; j >= 0; j--) {
    if (labelYs[j] - labelYs[j + 1] < minDist) {
      labelYs[j] = labelYs[j + 1] + minDist;
    }
  }

  ctx.textBaseline = 'middle';
  for (let i = 0; i < notes.length; i++) {
    const n = notes[i];
    if (!n.entry) continue;
    const color = INTERVAL_COLORS[n.entry.interval] || COLOR_FG;
    ctx.fillStyle = color;
    ctx.fillText(`${n.entry.interval}  ${n.entry.original}`, labelX, labelYs[i]);
  }
}

// ── recall cues ───────────────────────────────────────────────────────────────

function computeCues(root, quality) {
  const SHARP_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const FLAT_NOTES  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
  const NOTE_SEMI   = {
    'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'Fb':4,'E#':5,'F':5,
    'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'Cb':11,'B#':0
  };

  function noteAt(r, semis, flats) {
    const s = ((NOTE_SEMI[r] + semis) % 12 + 12) % 12;
    return flats ? FLAT_NOTES[s] : SHARP_NOTES[s];
  }
  function fmt(n) { return n.replace('b','♭').replace('#','♯'); }
  function accStr(n, type) {
    if (n === 0) return 'no sharps or flats';
    return type === 'flat' ? `${n} flat${n === 1 ? '' : 's'}` : `${n} sharp${n === 1 ? '' : 's'}`;
  }

  const isMajorFam = quality === 'Major' || quality === 'Augmented';
  const keySigs = window.__keySignatures || [];
  const enharmonic = window.__enharmonicNormalization || {};

  // Normalize root via enharmonicNormalization (e.g. "Ab minor" → "G# minor")
  const qualityWord = isMajorFam ? 'major' : 'minor';
  const normKey = `${root} ${qualityWord}`;
  let displayRoot = root;
  if (enharmonic[normKey]) {
    displayRoot = enharmonic[normKey].split(' ')[0];
  }

  // Find key signature entry using normalized root
  const entry = isMajorFam
    ? keySigs.find(e => e.major === displayRoot)
    : keySigs.find(e => e.minor === displayRoot);
  if (!entry) return [`(no key data for ${root} ${quality})`];

  const acc     = entry.accidentals;
  const type    = entry.type;
  const useFlats = type === 'flat';
  const keyWord  = isMajorFam ? 'major' : 'minor';

  // 1. Key signature
  const cue1 = `${fmt(displayRoot)} ${keyWord}: ${accStr(acc, type)}`;

  // 2. Relative key (major↔minor, same key signature)
  let cue2;
  if (isMajorFam) {
    cue2 = `relative minor: ${fmt(entry.minor)} minor (${accStr(acc, type)})`;
  } else {
    cue2 = `relative major: ${fmt(entry.major)} major (${accStr(acc, type)})`;
  }

  // 3. Rule of 7 — same-letter major keys' accidentals always sum to 7
  //    For minor keys, apply the rule via the relative major
  let cue3;
  const r7root = isMajorFam ? displayRoot : entry.major;
  let r7name, r7acc;
  if (acc === 0) {
    r7name = noteAt(r7root, 1, false);
    r7acc = '7 sharps';
  } else if (type === 'flat') {
    r7name = noteAt(r7root, 1, false);
    const p = 7 - acc;
    r7acc = p === 0 ? 'no sharps or flats' : p + ` sharp${p === 1 ? '' : 's'}`;
  } else {
    r7name = noteAt(r7root, -1, true);
    const p = 7 - acc;
    r7acc = p === 0 ? 'no sharps or flats' : p + ` flat${p === 1 ? '' : 's'}`;
  }
  const r7key = `${r7name} major`;
  const r7enharmonic = enharmonic[r7key];
  if (r7enharmonic) {
    const normRoot = r7enharmonic.replace(/ major$/, '');
    const normEntry = keySigs.find(e => e.major === normRoot);
    const normAcc = normEntry ? accStr(normEntry.accidentals, normEntry.type) : '';
    cue3 = `rule of 7: ${fmt(r7name)} major (${r7acc}), usually written as ${fmt(normRoot)} major (${normAcc})`;
  } else {
    cue3 = `rule of 7: ${fmt(r7name)} major: ${r7acc}`;
  }

  // 4. Third
  const thirdNote = noteAt(displayRoot, isMajorFam ? 4 : 3, useFlats);
  cue4 = `${isMajorFam ? 'major' : 'minor'} 3rd of ${fmt(displayRoot)}: ${fmt(thirdNote)}`;

  // 5. Fifth (varies by quality)
  const fifthSemis = quality === 'Augmented' ? 8 : quality === 'Diminished' ? 6 : 7;
  const fifthLabel = quality === 'Augmented' ? 'aug 5th' : quality === 'Diminished' ? 'dim 5th' : 'perfect 5th';
  const fifthNote  = noteAt(displayRoot, fifthSemis, useFlats);
  cue5 = `${fifthLabel} of ${fmt(displayRoot)}: ${fmt(fifthNote)}`;

  return [cue1, cue2, cue3, cue4, cue5];
}

function drawCues(ctx, triad, imgW, startY) {
  const m = triad.name.match(/^(.+?)\s+(Major|Minor|Diminished|Augmented)\s+/);
  if (!m) return;
  const [, root, quality] = m;
  const cues = computeCues(root, quality);

  // Separator
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(MARGIN, startY + 7);
  ctx.lineTo(imgW - MARGIN, startY + 7);
  ctx.stroke();

  // Cue lines
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.textBaseline = 'alphabetic';
  const LINE_H = 21;
  for (let i = 0; i < cues.length; i++) {
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`${i + 1}. ${cues[i]}`, MARGIN, startY + 22 + i * LINE_H);
  }
}

window.renderDiagram = renderDiagram;
</script>
</body>
</html>
